
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Utley's Refreshments</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      position: relative;
      overflow: hidden;
    }
    .logo-background {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 160%;
      opacity: 0.08;
      z-index: 0;
    }
    .overlay {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 100px 20px;
      color: white;
      text-shadow: 2px 2px 6px black;
    }
    .overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .overlay p {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <img src="utleys_logo_oversized.png" alt="Utley's Logo Background" class="logo-background">
  <div class="overlay">
    <h1>Utley's Refreshments</h1>
    <p>Changing Lives One Sip At A Time</p>
  </div>
</body>
</html>
